<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b11"/>
      <stop offset="100%" style="stop-color:#131828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Cart body -->
  <rect x="100" y="180" width="280" height="170" rx="20" fill="url(#accent)" opacity="0.15"/>
  <rect x="100" y="180" width="280" height="170" rx="20" fill="none" stroke="url(#accent)" stroke-width="8"/>

  <!-- Cart handle -->
  <path d="M 80 140 L 120 180 L 380 180" stroke="url(#accent)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Shopping cart items (lines) -->
  <line x1="140" y1="220" x2="340" y2="220" stroke="url(#teal)" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="255" x2="290" y2="255" stroke="url(#teal)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="140" y1="290" x2="250" y2="290" stroke="url(#teal)" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

  <!-- Cart wheels -->
  <circle cx="175" cy="390" r="28" fill="url(#accent)" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="175" cy="390" r="12" fill="#080b11"/>
  <circle cx="315" cy="390" r="28" fill="url(#accent)" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="315" cy="390" r="12" fill="#080b11"/>

  <!-- Arabic "G" letter (ج) for "Gasser" - stylized -->
  <text x="256" y="145" font-family="Cairo, Arial" font-size="72" font-weight="800"
        fill="url(#teal)" text-anchor="middle" dominant-baseline="middle">ج</text>
</svg>
